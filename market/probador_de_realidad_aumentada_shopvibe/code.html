<!-- Micro-interactions Script -->
<script>
        function capturePhoto() {
            // Flash effect
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 bg-white z-[100] animate-pulse';
            document.body.appendChild(flash);
            
            // Haptic feedback simulation
            if ('vibrate' in navigator) {
                navigator.vibrate(50);
            }

            setTimeout(() => {
                flash.remove();
                alert('Photo saved to your ShopVibe Gallery!');
            }, 300);
        }

        // Add some floating animation to elements
        document.querySelectorAll('.backdrop-blur-lg').forEach((el, i) => {
            el.style.animation = `float ${3 + i}s ease-in-out infinite`;
        });

        // Dynamic Grid Tracking Effect
        window.addEventListener('mousemove', (e) => {
            const grid = document.querySelector('.ar-grid');
            if(grid) {
                const moveX = (e.clientX - window.innerWidth / 2) / 50;
                const moveY = (e.clientY - window.innerHeight / 2) / 50;
                grid.style.transform = `rotateX(60deg) translateX(${moveX}px) translateY(${moveY}px)`;
            }
        });
    </script>
<style>

            to { opacity: 1; transform: translateX(0); }

            display: none;

            -ms-overflow-style: none;
            scrollbar-width: none;
