                    Drafts
                </button>
<button class="h-12 bg-primary-container text-white font-label-bold text-label-bold rounded-lg hover:opacity-90 active:scale-95 shadow-lg shadow-primary-container/20 transition-all uppercase tracking-wider">
                    Post Video
                </button>
</div>
</aside>

<!-- Bottom Nav Bar (Suppressed on this transactional screen as per instructions, but placeholder logic if needed) -->
<!-- The Navigation Shell is hidden to prioritize the upload focus -->
<script>
        // Micro-interactions for tag selection
        document.querySelectorAll('.flex-shrink-0.w-24').forEach(item => {
            item.addEventListener('click', function() {
                const icon = this.querySelector('.material-symbols-outlined');
                if (icon.textContent === 'add') {
                    icon.textContent = 'check';
                    this.querySelector('.h-24').classList.add('border-primary-container');
                    this.querySelector('.bg-primary-container\\/20').classList.replace('opacity-0', 'opacity-100');
                } else {
                    icon.textContent = 'add';
                    this.querySelector('.h-24').classList.remove('border-primary-container');
                    this.querySelector('.bg-primary-container\\/20').classList.replace('opacity-100', 'opacity-0');
                }
            });
        });

        // Simple haptic-like feedback on post button
        const postBtn = document.querySelector('button.bg-primary-container');
        postBtn.addEventListener('click', () => {
            postBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span> Posting...';
            setTimeout(() => {
                postBtn.innerHTML = 'Post Video';
                alert('ShopVibe: Video posted successfully!');
            }, 1500);
        });
    </script>
