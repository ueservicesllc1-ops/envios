<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* 1. Animation of the Box: Gentle shake loop and entry animation */
        @keyframes box-entry {
            0% { transform: scale(0.5) translateY(50px); filter: brightness(2) blur(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); filter: brightness(1) blur(0); opacity: 1; }
        }
        @keyframes box-shake {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            25% { transform: rotate(-2deg) translateY(-5px); }
            75% { transform: rotate(2deg) translateY(-2px); }
        }
        .animate-box-entry {
            animation: box-entry 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .mystery-box-loop {
            animation: box-shake 4s ease-in-out infinite;
        }

        /* 2. Background Atmospheric Gradient */
        @keyframes bg-gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-bg {
            background: linear-gradient(-45deg, #fcf9f8, #ffdbcc, #f0eded, #ffdad5);
            background-size: 400% 400%;
            animation: bg-gradient-move 15s ease infinite;
        }

        /* 3. Prize Reveal Pop-up and Glow */
        @keyframes prize-pop {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes glow-pulse {
            0%, 100% { box-shadow: 0 0 15px 5px rgba(255, 107, 0, 0.2); }
            50% { box-shadow: 0 0 30px 15px rgba(255, 107, 0, 0.5); }
        }
        .prize-reveal {
            animation: prize-pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.5s;
            opacity: 0;
        }
        .prize-glow {
            animation: glow-pulse 3s infinite ease-in-out;
        }

        /* 5. CTA Button Pulse */
        @keyframes button-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 107, 0, 0.4); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(255, 107, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 107, 0, 0); }
        }
        .btn-pulse {
            animation: button-pulse 2s infinite;
        }

        /* Particle styles */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            border-radius: 50%;
        }

            min-height: max(884px, 100dvh);

<script>
        /**
         * 2. Particle System
         * Emits stars and sparkles from the center of the box continuously.
         */
        function initParticleSystem() {
            const container = document.getElementById('particles-container');
            if (!container) return;

            const config = {
                particleCount: 50,
                colors: ['#ff6b00', '#ffd700', '#ffffff', '#ffdbcc'],
                symbols: ['★', '✧', '•', '✨']
            };

            function createParticle() {
                const particle = document.createElement('div');
                const symbol = config.symbols[Math.floor(Math.random() * config.symbols.length)];
                const color = config.colors[Math.floor(Math.random() * config.colors.length)];
                
                particle.className = 'particle';
                particle.innerHTML = symbol;
                particle.style.color = color;
                particle.style.fontSize = (Math.random() * 10 + 10) + 'px';
                
                // Start at center
                particle.style.left = '50%';
                particle.style.top = '50%';
                
                container.appendChild(particle);
                
                animateParticle(particle);
            }

            function animateParticle(p) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 180 + 60;
                const duration = Math.random() * 2000 + 1500;
                
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                const rotation = Math.random() * 360;

                const animation = p.animate([
                    { transform: 'translate(-50%, -50%) scale(0) rotate(0deg)', opacity: 0 },
                    { transform: `translate(calc(-50% + ${tx * 0.4}px), calc(-50% + ${ty * 0.4}px)) scale(1.2) rotate(${rotation * 0.5}deg)`, opacity: 1, offset: 0.3 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0) rotate(${rotation}deg)`, opacity: 0 }
                ], {
                    duration: duration,
                    easing: 'ease-out'
                });

                animation.onfinish = () => {
                    p.remove();
                    createParticle(); // Continuous loop
                };
            }

            // Initial burst
            for (let i = 0; i < config.particleCount; i++) {
                setTimeout(createParticle, Math.random() * 3000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initParticleSystem();
        });
    </script>
