<!-- Interaction Overlay (Simulation) -->
<div class="fixed inset-0 z-[100] pointer-events-none opacity-0 transition-opacity duration-700 bg-primary flex items-center justify-center overflow-hidden" id="live-overlay">
<div class="text-white text-center">
<div class="relative">
<div class="absolute inset-0 bg-white/20 animate-ping rounded-full"></div>
<span class="material-symbols-outlined text-[120px]" data-icon="live_tv">live_tv</span>
</div>
<h2 class="font-display-lg text-display-lg mt-md">Going Live in 3...</h2>
</div>
</div>
<script>
        function startStreamAnimation() {
            const btn = document.getElementById('go-live-btn');
            const overlay = document.getElementById('live-overlay');
            const text = overlay.querySelector('h2');
            
            overlay.classList.remove('opacity-0');
            overlay.classList.add('pointer-events-auto', 'opacity-100');
            
            let count = 3;
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    text.innerText = `Going Live in ${count}...`;
                } else if (count === 0) {
                    text.innerText = "You're Live!";
                    clearInterval(timer);
                    setTimeout(() => {
                        overlay.classList.add('opacity-0');
                        overlay.classList.remove('pointer-events-auto');
                    }, 1000);
                }
            }, 1000);
        }

        // Title Counter Simulation
        const titleInput = document.getElementById('stream-title');
        const counter = titleInput.nextElementSibling;
        titleInput.addEventListener('input', (e) => {
            const len = e.target.value.length;
            counter.innerText = `${len}/60`;
            if (len > 60) {
                counter.classList.add('text-error');
            } else {
                counter.classList.remove('text-error');
            }
        });
    </script>
